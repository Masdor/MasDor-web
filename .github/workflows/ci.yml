name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Verhindert parallele Runs auf dem gleichen Branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Qualitätsprüfung ───
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test

  # ─── Build & Bundle-Analyse ───
  build:
    name: Build & Bundle Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Bundle size report
        run: node scripts/bundle-report.mjs

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  # ─── Docker Build Test ───
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: lab-root-web:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      - name: Test container starts
        run: |
          docker run -d --name lr-test -p 8080:80 lab-root-web:ci-${{ github.sha }}
          sleep 3

          # Healthcheck
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Container health check failed"
            docker logs lr-test
            exit 1
          fi

          # Security Headers prüfen
          echo "── Security Headers ──"
          curl -s -I http://localhost:8080/ | grep -iE "content-security|x-frame|x-content|referrer|strict-transport|permissions|cross-origin"

          # Service Worker vorhanden?
          SW_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/sw.js)
          echo "SW Status: $SW_STATUS"

          docker stop lr-test && docker rm lr-test
          echo "Container test passed"

      - name: Check image size
        run: |
          SIZE=$(docker image inspect lab-root-web:ci-${{ github.sha }} --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB} MB"
          if [ "$SIZE_MB" -gt 100 ]; then
            echo "Warning: Image exceeds 100 MB budget (${SIZE_MB} MB)"
          fi
