server {
    listen 80;
    server_name _;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    # ─── Compression ───

    # Gzip (Fallback für Browser ohne Brotli-Support)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    # Vorkomprimierte Dateien ausliefern (Brotli bevorzugt, Gzip als Fallback)
    gzip_static on;
    brotli_static on;

    # ─── Caching ───

    # Hashed Assets (JS, CSS, Fonts) — lang cachen
    location /assets/ {
        include /etc/nginx/snippets/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # Statische Dateien (Favicon, OG-Image, Manifest)
    location ~* \.(ico|svg|png|jpg|jpeg|webp|json|xml|txt)$ {
        include /etc/nginx/snippets/security-headers.conf;
        expires 30d;
        add_header Cache-Control "public" always;
        try_files $uri =404;
    }

    # ─── SPA Routing ───
    location / {
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ /index.html;
        # HTML nicht cachen (damit Updates sofort greifen)
        add_header Cache-Control "no-cache" always;
    }

    # ─── Error Pages ───
    error_page 404 /index.html;
}
