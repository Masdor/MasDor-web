server {
    listen 80;
    server_name _;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    # ─── Compression ───

    # Gzip (Fallback für Browser ohne Brotli-Support)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    # Vorkomprimierte Dateien ausliefern (Brotli bevorzugt, Gzip als Fallback)
    gzip_static on;
    brotli_static on;

    # ─── Security Headers ───
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ─── Caching ───

    # Hashed Assets (JS, CSS, Fonts) — lang cachen
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Statische Dateien (Favicon, OG-Image, Manifest)
    location ~* \.(ico|svg|png|jpg|jpeg|webp|json|xml|txt)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ─── SPA Routing ───
    location / {
        try_files $uri $uri/ /index.html;
        # HTML nicht cachen (damit Updates sofort greifen)
        add_header Cache-Control "no-cache";
    }

    # ─── Error Pages ───
    error_page 404 /index.html;
}
