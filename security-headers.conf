# ─── Security Headers (inkludiert in jedem location-Block) ───

# Content-Security-Policy (migriert von Meta-Tag via Vite-Plugin zu HTTP-Header)
# HINWEIS: 'unsafe-inline' in style-src nötig wegen React inline style={} für CSS Custom Properties
add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://analytics.lab-root.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://analytics.lab-root.com; worker-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; object-src 'none'" always;

# HSTS — Browser soll nur HTTPS nutzen (2 Jahre, inkl. Subdomains)
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# Verhindert Clickjacking (Fallback für ältere Browser, CSP frame-ancestors ist der moderne Ersatz)
add_header X-Frame-Options "SAMEORIGIN" always;

# Verhindert MIME-Type-Sniffing
add_header X-Content-Type-Options "nosniff" always;

# Referrer-Policy — Referrer nur bei same-origin oder HTTPS-Downgrade
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions-Policy — Sensible APIs explizit deaktivieren
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

# Cross-Origin-Opener-Policy — Verhindert dass andere Seiten window-Referenz erhalten
add_header Cross-Origin-Opener-Policy "same-origin" always;

# Cross-Origin-Resource-Policy — Verhindert dass andere Origins unsere Ressourcen laden
add_header Cross-Origin-Resource-Policy "same-origin" always;
